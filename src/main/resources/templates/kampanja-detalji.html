<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${kampanja.naziv}">Kampanja</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .back { display: inline-block; margin-bottom: 16px; color: #2c7be5; text-decoration: none; }
        .info-grid { display: grid; grid-template-columns: 150px 1fr; gap: 6px 16px; max-width: 600px; margin-bottom: 24px; }
        .info-grid span:nth-child(odd) { font-weight: bold; color: #555; }
        #map { height: 450px; border: 1px solid #ccc; border-radius: 4px; margin-bottom: 24px; }
        table { border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid #ccc; padding: 8px 12px; text-align: left; }
        th { background-color: #f0f0f0; }
        .badge { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 0.85em; background: #d1ecf1; color: #0c5460; }
    </style>
</head>
<body>
    <a class="back" th:href="@{/kampanje}">← Nazad na kampanje</a>

    <h2 th:text="${kampanja.naziv}"></h2>

    <div class="info-grid">
        <span>Opis</span>       <span th:text="${kampanja.opis ?: '-'}"></span>
        <span>Datum početka</span> <span th:text="${kampanja.datumPocetka ?: '-'}"></span>
        <span>Datum kraja</span>   <span th:text="${kampanja.datumKraja ?: '-'}"></span>
        <span>Status</span>     <span><span class="badge" th:text="${kampanja.status ?: '-'}"></span></span>
        <span>Broj točaka</span><span th:text="${#lists.size(points)}"></span>
    </div>

    <div id="map"></div>

    <h3>Točke kampanje</h3>
    <p th:if="${#lists.isEmpty(points)}">Nema točaka u ovoj kampanji.</p>

    <table th:unless="${#lists.isEmpty(points)}">
        <thead>
            <tr>
                <th>Broj točke</th>
                <th>Vrsta</th>
                <th>E</th>
                <th>N</th>
                <th>h</th>
                <th>Metoda</th>
                <th>Točnost (m)</th>
                <th>Datum mjerenja</th>
                <th>Napomena</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="p : ${points}">
                <td th:text="${p.brojTocke}"></td>
                <td th:text="${p.vrsta}"></td>
                <td th:text="${p.E}"></td>
                <td th:text="${p.N}"></td>
                <td th:text="${p.h}"></td>
                <td th:text="${p.metodaMjerenja}"></td>
                <td th:text="${p.tocnost}"></td>
                <td th:text="${p.datumMjerenja}"></td>
                <td th:text="${p.napomena}"></td>
            </tr>
        </tbody>
    </table>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/proj4@2.11.0/dist/proj4.js"></script>
    <script th:inline="javascript">
        proj4.defs('EPSG:3765', '+proj=tmerc +lat_0=0 +lon_0=16.5 +k=0.9999 +x_0=500000 +y_0=0 +ellps=GRS80 +towgs84=0,0,0,0,0,0,0 +units=m +no_defs');

        function htrsToWgs84(E, N) {
            return proj4('EPSG:3765', 'WGS84', [E, N]);
        }

        const points = /*[[${points}]]*/ [];

        const map = L.map('map');

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // mapa id -> {lat, lon} za crtanje linija
        const coordMap = {};
        const allMarkers = [];

        points.forEach(p => {
            if (p.e != null && p.n != null && (p.e !== 0 || p.n !== 0)) {
                const [lon, lat] = htrsToWgs84(p.e, p.n);
                coordMap[p.id_point] = [lat, lon];

                const marker = L.marker([lat, lon]).addTo(map);
                marker.bindPopup(
                    '<b>' + (p.brojTocke || 'N/A') + '</b><br>' +
                    'Vrsta: ' + (p.vrsta || '-') + '<br>' +
                    'E: ' + p.e + '<br>' +
                    'N: ' + p.n + '<br>' +
                    'h: ' + p.h + ' m<br>' +
                    'Metoda: ' + (p.metodaMjerenja || '-') + '<br>' +
                    'Točnost: ' + p.tocnost + ' m<br>' +
                    (p.napomena ? 'Napomena: ' + p.napomena : '')
                );
                allMarkers.push(marker);
            }
        });

        // crtanje linija između povezanih točaka
        points.forEach(p => {
            if (p.odTockeId && p.id_point && coordMap[p.odTockeId] && coordMap[p.id_point]) {
                L.polyline([coordMap[p.odTockeId], coordMap[p.id_point]], {
                    color: '#2c7be5', weight: 2
                }).addTo(map);
            }
            if (p.doTockeId && p.id_point && coordMap[p.id_point] && coordMap[p.doTockeId]) {
                L.polyline([coordMap[p.id_point], coordMap[p.doTockeId]], {
                    color: '#2c7be5', weight: 2
                }).addTo(map);
            }
        });

        if (allMarkers.length > 0) {
            const group = L.featureGroup(allMarkers);
            map.fitBounds(group.getBounds().pad(0.2));
        } else {
            map.setView([45.1, 15.2], 7);
        }
    </script>
</body>
</html>
